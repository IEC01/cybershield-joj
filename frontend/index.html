<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CyberShield JOJ — Dakar 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3748;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: #1e40af;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .logo-text p  { font-size: 11px; color: #64748b; }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #94a3b8;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .alert-banner {
      display: none;
      background: #7f1d1d;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 10px 24px;
      font-size: 13px;
      font-weight: 500;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateY(-10px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 20px 24px;
    }

    .metric-card {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 16px;
    }

    .metric-card .label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .metric-card .value {
      font-size: 28px;
      font-weight: 700;
    }

    .metric-card.danger .value { color: #ef4444; }
    .metric-card.safe   .value { color: #22c55e; }
    .metric-card.info   .value { color: #60a5fa; }
    .metric-card.warn   .value { color: #f59e0b; }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      padding: 0 24px 24px;
    }

    .panel {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #2d3748;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-body { padding: 0; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      padding: 10px 14px;
      text-align: left;
      color: #475569;
      font-weight: 500;
      border-bottom: 1px solid #2d3748;
      font-size: 11px;
      text-transform: uppercase;
    }

    tbody tr {
      border-bottom: 1px solid #1e2535;
      transition: background 0.15s;
    }

    tbody tr:hover        { background: #1e2535; }
    tbody tr.anomaly      { background: #1f0a0a; }
    tbody tr.anomaly:hover{ background: #2a0e0e; }

    td { padding: 9px 14px; color: #cbd5e1; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge.ok      { background: #14532d; color: #86efac; }
    .badge.danger  { background: #7f1d1d; color: #fca5a5; }
    .badge.warning { background: #78350f; color: #fcd34d; }

    .score-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-track {
      flex: 1;
      height: 4px;
      background: #2d3748;
      border-radius: 2px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .attack-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 14px;
    }

    .attack-btn {
      background: #1e2535;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      color: #e2e8f0;
      transition: all 0.15s;
    }

    .attack-btn:hover {
      background: #263044;
      border-color: #3b82f6;
    }

    .attack-btn .btn-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .attack-btn .btn-sub {
      font-size: 11px;
      color: #64748b;
    }

    .stop-btn {
      width: calc(100% - 28px);
      margin: 0 14px 14px;
      background: #1f0a0a;
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 9px;
      color: #fca5a5;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .stop-btn:hover { background: #2a0e0e; }

    .alerts-list {
      max-height: 220px;
      overflow-y: auto;
      padding: 10px 14px;
    }

    .alert-item {
      background: #1f0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 11px;
      color: #fca5a5;
      animation: fadeIn 0.3s ease;
    }

    .alert-item .alert-time {
      color: #ef4444;
      font-weight: 500;
      margin-bottom: 2px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    code {
      font-family: monospace;
      background: #1e2535;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
      color: #93c5fd;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛡</div>
    <div class="logo-text">
      <h1>CyberShield JOJ</h1>
      <p>Dakar 2026 — SOC Cybersécurité</p>
    </div>
  </div>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Connexion...</span>
  </div>
</header>

<div class="alert-banner" id="alert-banner"></div>

<div class="metrics">
  <div class="metric-card info">
    <div class="label">Requêtes / min</div>
    <div class="value" id="m-total">0</div>
  </div>
  <div class="metric-card danger">
    <div class="label">Anomalies détectées</div>
    <div class="value" id="m-anomalies">0</div>
  </div>
  <div class="metric-card warn">
    <div class="label">IPs bloquées</div>
    <div class="value" id="m-blocked">0</div>
  </div>
  <div class="metric-card safe">
    <div class="label">Score sécurité</div>
    <div class="value" id="m-score">100%</div>
  </div>
</div>

<div class="main-grid">

  <div class="panel">
    <div class="panel-header">
      <span>Flux réseau en temps réel</span>
      <span id="log-count" style="font-size:11px;color:#475569">0 entrées</span>
    </div>
    <div class="panel-body">
      <table>
        <thead>
          <tr>
            <th>Heure</th>
            <th>IP Source</th>
            <th>Système JOJ</th>
            <th>Requête</th>
            <th>Score IA</th>
            <th>Verdict</th>
          </tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:16px;">

    <div class="panel">
      <div class="panel-header">Simulateur d'attaques</div>
      <div class="attack-buttons">
        <button class="attack-btn" onclick="attack('ddos')">
          <div class="btn-title">DDoS</div>
          <div class="btn-sub">Flood HTTP</div>
        </button>
        <button class="attack-btn" onclick="attack('brute')">
          <div class="btn-title">Brute Force</div>
          <div class="btn-sub">Auth SSH</div>
        </button>
        <button class="attack-btn" onclick="attack('scan')">
          <div class="btn-title">Port Scan</div>
          <div class="btn-sub">Reconnaissance</div>
        </button>
        <button class="attack-btn" onclick="attack('sqli')">
          <div class="btn-title">SQL Injection</div>
          <div class="btn-sub">Exfiltration</div>
        </button>
      </div>
      <button class="stop-btn" onclick="stopAttack()">Arrêter l'attaque</button>
    </div>

    <div class="panel">
      <div class="panel-header">Alertes récentes</div>
      <div class="alerts-list" id="alerts-list">
        <div style="color:#475569;font-size:12px;padding:8px 0">
          Aucune alerte pour l'instant...
        </div>
      </div>
    </div>

  </div>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
